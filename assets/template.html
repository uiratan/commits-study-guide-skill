<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Study Guide</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --sidebar-bg: #fcfcfc;
            --sidebar-text: #4a4a4a;
            --text-color: #4a4a4a;
            --text-strong: #1a1a1a;
            --border-color: #e0e0e0;
            --card-bg: #ffffff;
            --header-bg: #f5f5f5;
            --topic-bg: #f5f5f5;
            --conclusion-bg: #f0f0f0;
            --accent: #333333;
            --code-bg: #f6f8fa;
            --code-text: #24292f;
            --diff-add-bg: #dafbe1;
            --diff-add-text: #1a7f37;
            --diff-del-bg: #ffebe9;
            --diff-del-text: #cf222e;
            --diff-info-bg: #ddf4ff;
            --diff-info-text: #0969da;
            --diff-header-bg: #24292f;
            --diff-header-text: #ffffff;
        }

        body.dark-mode {
            --bg-color: #121212;
            --sidebar-bg: #121212;
            --sidebar-text: #a0a0a0;
            --text-color: #a0a0a0;
            --text-strong: #ffffff;
            --border-color: #2a2a2a;
            --card-bg: #1a1a1a;
            --header-bg: #1a1a1a;
            --topic-bg: #121212;
            --conclusion-bg: #252525;
            --accent: #e0e0e0;
            --code-bg: #0d1117;
            --code-text: #c9d1d9;
            --diff-add-bg: rgba(46, 160, 67, 0.15);
            --diff-add-text: #3fb950;
            --diff-del-bg: rgba(248, 81, 73, 0.15);
            --diff-del-text: #f85149;
            --diff-info-bg: rgba(56, 139, 253, 0.1);
            --diff-info-text: #8b949e;
            --diff-header-bg: #2d2d2d;
            --diff-header-text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.2s, color 0.2s;
        }

        .sidebar {
            width: 300px;
            min-width: 150px;
            max-width: 500px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--header-bg);
        }
        .sidebar-header h2 { margin: 0; font-size: 1rem; font-weight: 700; text-transform: uppercase; color: var(--text-strong); }
        .sidebar-header .meta { margin-top: 12px; font-size: 0.7rem; color: var(--text-color); opacity: 0.8; }

        .nav-links { flex: 1; overflow-y: auto; padding: 16px 8px; }
        .nav-links a {
            display: block;
            padding: 10px 16px;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: 8px;
            margin-bottom: 4px;
            white-space: normal;
            word-wrap: break-word;
            transition: all 0.2s;
        }
        .nav-links a:hover { background-color: var(--topic-bg); color: var(--text-strong); }
        .nav-links a.active { background-color: var(--accent); color: #fff; }

        .theme-toggle {
            background: var(--topic-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .content { flex: 1; overflow-y: auto; padding: 40px 60px; scroll-behavior: smooth; }
        .feed-container { width: 95%; margin: 0 auto; }

        .commit-section {
            background: var(--card-bg);
            margin-bottom: 60px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .commit-header { padding: 32px 40px; border-bottom: 1px solid var(--border-color); }
        .commit-header .sha {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--accent);
            background: var(--conclusion-bg);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            margin-bottom: 12px;
            display: inline-block;
        }
        .commit-header h1 { color: var(--text-strong); font-size: 1.75rem; margin: 0; font-weight: 800; }

        .commit-body { padding: 40px; }
        .topic { margin-bottom: 32px; }
        .topic strong { color: var(--accent); display: block; margin-bottom: 12px; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
        .topic p { margin: 0; font-size: 1.05rem; }
        .topic ul { margin: 0; padding-left: 20px; list-style-type: disc; }
        .topic ul li { margin-bottom: 12px; font-size: 1.05rem; color: var(--text-color); }
        .topic a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); font-weight: 600; }

        .conclusion {
            background-color: var(--conclusion-bg);
            padding: 24px;
            border-radius: 12px;
            margin: 40px 0;
            border-left: 4px solid var(--accent);
        }
        .conclusion p { margin: 0; font-weight: 500; color: var(--text-strong); }

        pre.code-diff {
            background-color: var(--code-bg);
            color: var(--code-text);
            padding: 24px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0;
            border: 1px solid var(--border-color);
        }
        .diff-line { display: block; padding: 0 16px; margin: 0 -24px; white-space: pre; background-color: transparent; }
        .diff-line.add { background-color: var(--diff-add-bg); color: var(--diff-add-text); }
        .diff-line.del { background-color: var(--diff-del-bg); color: var(--diff-del-text); }
        .diff-line.info { background-color: var(--diff-info-bg); color: var(--diff-info-text); padding-top: 12px; margin-top: 12px; }
        .diff-line.file-header {
            background-color: var(--diff-header-bg);
            color: var(--diff-header-text);
            font-weight: 600;
            margin: 24px -24px 0 -24px;
            padding: 8px 24px;
            display: block;
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
        }
        .diff-line.file-header:first-child { margin-top: 0; border-top: none; }

        .resizer { width: 4px; cursor: col-resize; background-color: transparent; flex-shrink: 0; z-index: 20; }
        .resizer:hover { background-color: var(--accent); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Study Guide</h2>
            <div class="meta">
                <div>Hierarquia: {{HIERARQUIA}}</div>
                <div>Remoto: {{REMOTO}}</div>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <span id="themeIcon">🌙</span> <span id="themeText">Dark Mode</span>
            </button>
        </div>
        <div class="nav-links">
            {{NAV_LINKS}}
        </div>
    </div>
    <div class="resizer" id="dragMe"></div>
    <div class="content">
        <div class="feed-container">
            {{CONTENT}}
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        const applyTheme = (theme) => {
            if (theme === 'dark') {
                body.classList.add('dark-mode');
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Light Mode';
            } else {
                body.classList.remove('dark-mode');
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Dark Mode';
            }
        };

        themeToggle.addEventListener('click', () => {
            const isDark = body.classList.toggle('dark-mode');
            const theme = isDark ? 'dark' : 'light';
            applyTheme(theme);
            localStorage.setItem('theme', theme);
        });

        // Load saved
        applyTheme(localStorage.getItem('theme') || 'light');

        // Resizer
        const resizer = document.getElementById('dragMe');
        const sidebar = resizer.previousElementSibling;
        let x = 0, w = 0;
        resizer.addEventListener('mousedown', (e) => {
            x = e.clientX;
            w = parseInt(window.getComputedStyle(sidebar).width, 10);
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            resizer.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
        });
        const mouseMoveHandler = (e) => {
            const dx = e.clientX - x;
            sidebar.style.width = `${w + dx}px`;
        };
        const mouseUpHandler = () => {
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
            resizer.classList.remove('dragging');
            document.body.style.cursor = 'default';
        };
    </script>
</body>
</html>
